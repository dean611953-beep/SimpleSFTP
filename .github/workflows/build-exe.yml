name: Build & Release EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        working-directory: ./SimpleSFTP
        run: dotnet restore

      - name: Build
        working-directory: ./SimpleSFTP
        run: dotnet build -c Release --no-restore

      - name: Publish EXE (single file)
        working-directory: ./SimpleSFTP
        run: dotnet publish -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ../publish_exe

      - name: Upload executable as artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleFTP-win-x64
          path: publish_exe/
          retention-days: 30

      - name: Create Release ZIP
        run: |
          Compress-Archive -Path publish_exe/*,README.md,DEPLOYMENT.md,publish.bat -DestinationPath SimpleFTP-v1.0.0.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: SimpleFTP-v1.0.0.zip
          name: SimpleFTP v1.0.0
          tag_name: v1.0.0
          body: |
            ## SimpleFTP v1.0.0 - Windows 轻量 FTP 服务端

            ### 快速开始
            1. 安装 .NET 8.0 Runtime: https://dotnet.microsoft.com/download/dotnet/8.0
            2. 解压 SimpleFTP-v1.0.0.zip
            3. 运行 `SimpleFTP.exe`

            ### 功能
            - 一键启动/停止 FTP 服务
            - 记录所有上传文件（文件名、大小、时间、来源IP、用户名）
            - 实时日志
            - 支持断点续传（REST）
            - 支持被动模式（PASV）
            - 支持目录操作：CWD、LIST、NLST
          draft: false
          prerelease: false
