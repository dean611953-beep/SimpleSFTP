name: Build SimpleFTP EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        working-directory: ./SimpleSFTP/SimpleSFTP
        run: dotnet publish -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=false -o ../publish_exe

      - name: List output
        run: Get-ChildItem -Recurse ../publish_exe

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: SimpleFTP-exe
          path: SimpleSFTP/publish_exe/SimpleFTP.exe

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: SimpleFTP v1.0.0
          tag_name: v1.0.0
          files: SimpleSFTP/publish_exe/SimpleFTP.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
